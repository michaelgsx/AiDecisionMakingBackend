server:
  port: ${PORT:8787}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://${AZURE_SQL_SERVER:ai-rag-sql-server.database.windows.net}:${AZURE_SQL_PORT:1433};databaseName=${AZURE_SQL_DATABASE:ai-rag-db-1};encrypt=true;trustServerCertificate=false;loginTimeout=30}
    username: ${SPRING_DATASOURCE_USERNAME:${AZURE_SQL_USER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${AZURE_SQL_PASSWORD:}}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

app:
  ops-token: ${OPS_TOKEN:}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173}
  azure-openai:
    # Base URL only, no trailing slash (e.g. https://your-resource.openai.azure.com)
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_API_KEY:}
    embedding-deployment: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:}
    api-version: ${AZURE_OPENAI_API_VERSION:2024-02-01}
    # Set true for local dev without calling Azure (ingest still writes risk_features + risk_ingest_records).
    skip-embedding: ${AZURE_OPENAI_SKIP_EMBEDDING:false}
  azure-search:
    endpoint: ${AZURE_SEARCH_ENDPOINT:}
    admin-key: ${AZURE_SEARCH_ADMIN_KEY:}
    index-name: ${AZURE_SEARCH_INDEX_NAME:risk-records}
    api-version: ${AZURE_SEARCH_API_VERSION:2024-07-01}
    # true = do not push to AI Search (local dev).
    skip: ${AZURE_SEARCH_SKIP:false}
